<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DCC7A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8A07E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0E0E0E"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" rx="18" fill="none" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- JG Text -->
  <text x="50" y="70" font-family="Cambria, serif" font-size="48" font-weight="bold" fill="url(#grad)" text-anchor="middle">JG</text>
  
  <!-- Accent dot -->
  <circle cx="50" cy="20" r="4" fill="#DCC7A1"/>
</svg>
