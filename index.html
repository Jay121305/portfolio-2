    <script>

    <style>
      :root {
        --bg-color: #0a0a0a;
        --text-primary: #f0f0f0;
        --text-secondary: #a3a3a3;
        --text-tertiary: #737373;
        --border-color: rgba(255, 255, 255, 0.08);
        --card-bg: rgba(255, 255, 255, 0.03);
        --green: #4ade80;
      }
      
      * {
        scrollbar-width: thin;
        scrollbar-color: #4ade80 #0a0a0a;
      }
      *::-webkit-scrollbar { width: 6px; }
      *::-webkit-scrollbar-track { background: #0a0a0a; }
      *::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 3px; }
      
      body {
        background-color: #0a0a0a;
        color: #f0f0f0;
      }
      
      ::selection {
        background-color: #4ade80;
        color: #0a0a0a;
      }
      
      /* Custom animations */
      @keyframes slideInFromLeft {
        0% { transform: translateX(-30px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      
      @keyframes slideInFromRight {
        0% { transform: translateX(30px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      
      @keyframes fadeInUp {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      
      @keyframes scaleIn {
        0% { transform: scale(0.95); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      
      @keyframes subtleGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.1); }
        50% { box-shadow: 0 0 30px rgba(74, 222, 128, 0.25); }
      }
      
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      /* Animation utilities */
      .animate-slide-in-left { animation: slideInFromLeft 0.6s ease-out; }
      .animate-slide-in-right { animation: slideInFromRight 0.6s ease-out; }
      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
      .animate-scale-in { animation: scaleIn 0.4s ease-out; }
      .animate-subtle-glow { animation: subtleGlow 3s ease-in-out infinite; }
      .animate-marquee { animation: marquee 30s linear infinite; }
      
      /* Lorris-style card hover */
      .lorris-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .lorris-card:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(74, 222, 128, 0.2);
        transform: translateY(-2px);
      }
      
      /* Minimal line separator */
      .lorris-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(74, 222, 128, 0.3), transparent);
      }
      
      /* Hide scrollbar for nav */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Mesh background floating animations */
      @keyframes meshFloat1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(40px, -30px) scale(1.05); }
        66% { transform: translate(-20px, 20px) scale(0.95); }
      }
      @keyframes meshFloat2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-30px, 40px) scale(1.08); }
        66% { transform: translate(25px, -15px) scale(0.97); }
      }
      @keyframes meshFloat3 {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
      }
      @keyframes pulseSlow {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.8); }
      }
      .animate-mesh-float-1 { animation: meshFloat1 20s ease-in-out infinite; }
      .animate-mesh-float-2 { animation: meshFloat2 25s ease-in-out infinite; }
      .animate-mesh-float-3 { animation: meshFloat3 18s ease-in-out infinite; }
      .animate-pulse-slow { animation: pulseSlow 4s ease-in-out infinite; }

      /* Side decoration animations */
      @keyframes floatUpDown {
        0%, 100% { transform: translateY(0px); opacity: 0.4; }
        50% { transform: translateY(-25px); opacity: 0.8; }
      }
      @keyframes floatDownUp {
        0%, 100% { transform: translateY(0px); opacity: 0.4; }
        50% { transform: translateY(25px); opacity: 0.8; }
      }
      @keyframes spinSlow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes sideLinePulse {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.1; }
      }
      .animate-float-up-down { animation: floatUpDown 6s ease-in-out infinite; }
      .animate-float-down-up { animation: floatDownUp 6s ease-in-out infinite; }
      .animate-spin-slow { animation: spinSlow 20s linear infinite; }
      .animate-side-line-pulse { animation: sideLinePulse 8s ease-in-out infinite; }

      /* TargetCursor */
      .target-cursor-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: difference;
      }
      .target-cursor-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .target-cursor-corner {
        position: absolute;
        width: 12px;
        height: 12px;
        border: 3px solid #fff;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .corner-tl { border-right: none; border-bottom: none; }
      .corner-tr { border-left: none; border-bottom: none; }
      .corner-br { border-left: none; border-top: none; }
      .corner-bl { border-right: none; border-top: none; }
    </style>
