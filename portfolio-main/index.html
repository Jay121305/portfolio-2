    <style>
      :root {
        --bg-color: #0E0E0E;
        --text-primary: #e2e8f0;
        --text-secondary: #cbd5e1;
        --text-tertiary: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.05);
      }
      
      .light-theme {
        --bg-color: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #334155;
        --text-tertiary: #475569;
        --border-color: rgba(15, 23, 42, 0.1);
        --glass-bg: rgba(15, 23, 42, 0.05);
      }
      
      /* Light theme overrides for text colors */
      .light-theme .text-slate-100 {
        color: #0f172a !important;
      }
      .light-theme .text-slate-300 {
        color: #334155 !important;
      }
      .light-theme .text-slate-400 {
        color: #475569 !important;
      }
      .light-theme .bg-white\/5 {
        background-color: rgba(15, 23, 42, 0.05) !important;
      }
      .light-theme .border-white\/10 {
        border-color: rgba(15, 23, 42, 0.1) !important;
      }
      .light-theme .border-white\/20 {
        border-color: rgba(15, 23, 42, 0.15) !important;
      }
      
      body {
        background-color: #0E0E0E;
        background-image: radial-gradient(circle, rgba(220, 199, 161, 0.1) 1px, transparent 1px);
        background-size: 24px 24px;
      }
      ::selection {
        background-color: #DCC7A1;
        color: #0E0E0E;
      }
      /* Glassmorphism utility classes */
      .backdrop-blur-xl {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .backdrop-blur-2xl {
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      
      /* Custom animations */
      @keyframes slideInFromLeft {
        0% {
          transform: translateX(-100%);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes slideInFromRight {
        0% {
          transform: translateX(100%);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes fadeInUp {
        0% {
          transform: translateY(30px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }
      
      @keyframes scaleIn {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      
      @keyframes glow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(220, 199, 161, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(220, 199, 161, 0.6);
        }
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0) translateX(0) rotate(0deg);
        }
        33% {
          transform: translateY(-30px) translateX(20px) rotate(120deg);
        }
        66% {
          transform: translateY(20px) translateX(-20px) rotate(240deg);
        }
      }
      
      /* Animation utilities */
      .animate-slide-in-left {
        animation: slideInFromLeft 0.8s ease-out;
      }
      
      .animate-slide-in-right {
        animation: slideInFromRight 0.8s ease-out;
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out;
      }
      
      .animate-scale-in {
        animation: scaleIn 0.5s ease-out;
      }
      
      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }
      
      .animate-float {
        animation: float 20s ease-in-out infinite;
      }
    </style>
